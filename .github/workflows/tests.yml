name: Tests
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  types:
    runs-on: ubuntu-latest
    name: types
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Check types
        run: pnpm test:types
  lint:
    runs-on: ubuntu-latest
    name: lint
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Lint files
        run: pnpm lint
  unit:
    runs-on: ubuntu-latest
    name: unit
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Install Chrome for headless testing
        run: pnpm test:install-deps
      - name: Run tests
        run: pnpm test:unit
      - name: Collect coverage
        uses: codecov/codecov-action@v6
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  integration:
    runs-on: ubuntu-latest
    name: integration
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Install Chrome for headless testing
        run: pnpm test:install-deps
      - name: Restore integration test cache
        uses: actions/cache/restore@v6
        with:
          path: examples/**/common/test/integration-test-cache.json
          key: integration-test-cache-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            integration-test-cache-${{ runner.os }}-
      - name: Run tests
        run: |
          for attempt in 1 2 3; do
            pnpm examples:test && exit 0
            echo "Integration tests failed on attempt ${attempt}"
          done
          exit 1
      - name: Save integration test cache
        uses: actions/cache/save@v6
        if: success()
        with:
          path: examples/**/common/test/integration-test-cache.json
          key: integration-test-cache-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
